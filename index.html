<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Space Survival Mobile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body { 
      margin: 0; 
      padding: 0;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    /* Mobile UI button */
    #startBtn {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 40px;
      font-size: 24px;
      font-weight: bold;
      background: #00f5ff;
      color: #000;
      border: 3px solid #7b2fff;
      border-radius: 10px;
      z-index: 9999;
      cursor: pointer;
      pointer-events: auto;
      touch-action: manipulation;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
    }

    #startBtn:active {
      transform: translate(-50%, -50%) scale(0.95);
      opacity: 0.8;
    }

    #startBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

<button id="startBtn">Tap to Start</button>

<a-scene background="color: black">

  <!-- Camera (mobile-friendly) -->
  <a-entity id="player" position="0 1.6 0">
    <a-camera look-controls="touchEnabled: true">
      <a-cursor color="white"></a-cursor>
    </a-camera>
  </a-entity>

  <!-- Lights -->
  <a-entity light="type: ambient; intensity: 0.6"></a-entity>
  <a-entity light="type: point; intensity: 1; position: 2 4 4"></a-entity>

  <!-- Ground -->
  <a-plane rotation="-90 0 0" width="50" height="50" color="#111"></a-plane>

  <!-- Stars -->
  <a-sphere position="5 5 -10" radius="0.2" color="white"></a-sphere>
  <a-sphere position="-5 3 -8" radius="0.2" color="white"></a-sphere>
  <a-sphere position="3 7 -12" radius="0.2" color="white"></a-sphere>

  <!-- Base -->
  <a-box position="0 1 -5" color="#4CC3D9"></a-box>

  <!-- Enemy -->
  <a-sphere id="enemy" position="0 1 -10" radius="1" color="red"></a-sphere>

</a-scene>

<script>
const enemy = document.querySelector("#enemy");
const player = document.querySelector("#player");
const startBtn = document.querySelector("#startBtn");

let started = false;

// Mobile-friendly touch and click events
function handleStart(e) {
  e.preventDefault();
  e.stopPropagation();
  console.log('Start button touched/clicked');
  
  startBtn.style.display = "none";
  started = true;
}

// Support both touch and click
startBtn.addEventListener("click", handleStart, { passive: false });
startBtn.addEventListener("touchstart", handleStart, { passive: false });

// Simple forward movement (tap anywhere to move)
document.body.addEventListener("touchstart", (e) => {
  if (!started) return;

  let pos = player.getAttribute("position");
  pos.z -= 1;
  player.setAttribute("position", pos);
}, { passive: false });

// Enemy movement
function animateEnemy() {
  let z = -10;
  const interval = setInterval(() => {
    z += 0.05;
    enemy.setAttribute("position", `0 1 ${z}`);
    
    // Reset if too far
    if (z > 5) z = -10;
  }, 50);
}

window.addEventListener("load", () => {
  console.log('Page loaded, starting animation');
  animateEnemy();
});
</script>

</body>
</html>
