<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Drift – Fixed</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.5.0/aframe.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000010;color:white;font-family:monospace;overflow:hidden}

/* Screens */
.screen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:#000020;
  z-index:1000;
}
.screen.hidden{
  opacity:0;
  pointer-events:none;
  visibility:hidden;
}

/* Prevent overlay blocking */
.screen::before{pointer-events:none;}

#setupScreen{z-index:10001;}

/* Inputs always clickable */
select,input,button{
  pointer-events:auto!important;
  z-index:10002;
  position:relative;
}

/* A-Frame fix */
a-scene{
  position:fixed;
  inset:0;
  pointer-events:none;
}

.btn{
  padding:10px 20px;
  margin-top:20px;
  background:#7b2fff;
  border:none;
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- FLASH -->
<div id="flashScreen" class="screen">
  <h1>STELLAR DRIFT</h1>
  <p>Tap to continue</p>
</div>

<!-- SETUP -->
<div id="setupScreen" class="screen hidden">
  <h2>SETUP</h2>

  <select id="diffSelect">
    <option value="easy">Easy</option>
    <option value="normal" selected>Normal</option>
    <option value="hard">Hard</option>
  </select>

  <br><br>

  <input type="range" id="musicVol" min="0" max="100" value="60">
  <span id="volLabel">60%</span>

  <br><br>

  <label>Music <input type="checkbox" id="musicToggle" checked></label>
  <br>
  <label>SFX <input type="checkbox" id="sfxToggle" checked></label>
  <br>
  <label>VR <input type="checkbox" id="stereoToggle" checked></label>

  <button class="btn" id="startBtn">LAUNCH GAME</button>
</div>

<!-- GAME -->
<a-scene id="mainScene" style="display:none">
  <a-entity camera look-controls></a-entity>
</a-scene>

<script>
/* CONFIG */
const CONFIG = {
  difficulty:"normal",
  music:true,
  sfx:true,
  musicVolume:0.6,
  stereo:true
};

const STATE = {phase:"flash"};

/* DOM */
const flashScreen=document.getElementById("flashScreen");
const setupScreen=document.getElementById("setupScreen");
const mainScene=document.getElementById("mainScene");

const diffSelect=document.getElementById("diffSelect");
const musicVol=document.getElementById("musicVol");
const volLabel=document.getElementById("volLabel");
const musicToggle=document.getElementById("musicToggle");
const sfxToggle=document.getElementById("sfxToggle");
const stereoToggle=document.getElementById("stereoToggle");

/* SCREEN CONTROL */
function showScreen(id){
  [flashScreen,setupScreen].forEach(s=>{
    if(id && s.id===id) s.classList.remove("hidden");
    else s.classList.add("hidden");
  });
}

/* FLASH -> SETUP */
flashScreen.addEventListener("click",()=>{
  console.log("Flash clicked");
  showScreen("setupScreen");
});

/* SLIDER */
musicVol.addEventListener("input",()=>{
  volLabel.textContent=musicVol.value+"%";
  CONFIG.musicVolume=musicVol.value/100;
});

/* START BUTTON */
document.getElementById("startBtn").addEventListener("click",(e)=>{
  e.preventDefault();
  e.stopImmediatePropagation();

  console.log("START CLICKED");

  if(document.activeElement) document.activeElement.blur();

  CONFIG.difficulty=diffSelect.value;
  CONFIG.music=musicToggle.checked;
  CONFIG.sfx=sfxToggle.checked;
  CONFIG.stereo=stereoToggle.checked;

  console.log(CONFIG);

  /* Hide UI */
  showScreen(null);

  /* Enable scene */
  mainScene.style.display="block";
  mainScene.style.pointerEvents="auto";

  STATE.phase="playing";

  /* Optional VR */
  if(CONFIG.stereo){
    setTimeout(()=>{
      const scene=document.querySelector("a-scene");
      if(scene.enterVR){
        scene.enterVR().catch(()=>{});
      }
    },500);
  }
});

</script>

</body>
</html>
