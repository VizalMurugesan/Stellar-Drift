<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Stellar Drift – VR Space Game</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.5.0/aframe.min.js"></script>
  <script>
    AFRAME.registerComponent('head-drift', {
      tick() {
        if (typeof STATE === 'undefined' || STATE.phase !== 'playing') return;
        const rotation = this.el.getAttribute('rotation');
        const rig = this.el.parentNode;
        if (!rig || !rotation) return;
        const speed = 0.04, threshold = 15;
        let p = rig.getAttribute('position');
        if (rotation.x >  threshold) { p.z -= speed; rig.setAttribute('position', p); }
        if (rotation.x < -threshold) { p.z += speed; rig.setAttribute('position', p); }
        if (rotation.y >  threshold) { p.x -= speed; rig.setAttribute('position', p); }
        if (rotation.y < -threshold) { p.x += speed; rig.setAttribute('position', p); }
      }
    });
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #fff; }

    /* A-Frame canvas: always full screen, behind everything */
    a-scene { position: fixed !important; top: 0; left: 0; width: 100% !important; height: 100% !important; z-index: 0; display: block !important; }
    canvas  { display: block !important; }

    /* UI screens overlay the 3-D scene */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 200;
      background: radial-gradient(ellipse at center, rgba(10,10,46,.95) 0%, rgba(0,0,10,.97) 100%);
    }
    .screen.hidden { display: none !important; }
    .screen::before {
      content: ''; position: absolute; inset: 0; z-index: -1;
      background-image:
        radial-gradient(1px 1px at 12% 18%, #fff  0%, transparent 100%),
        radial-gradient(1px 1px at 28% 42%, #aaf  0%, transparent 100%),
        radial-gradient(2px 2px at 52%  7%, #fff  0%, transparent 100%),
        radial-gradient(1px 1px at 72% 63%, #ffa  0%, transparent 100%),
        radial-gradient(1px 1px at 88% 28%, #fff  0%, transparent 100%),
        radial-gradient(2px 2px at 38% 82%, #aff  0%, transparent 100%),
        radial-gradient(1px 1px at 62% 91%, #fff  0%, transparent 100%),
        radial-gradient(2px 2px at 91% 77%, #faf  0%, transparent 100%);
      animation: twinkle 4s infinite alternate;
    }
    @keyframes twinkle { from { opacity: .5 } to { opacity: 1 } }

    /* HUD */
    #hud {
      position: fixed; top: 0; left: 0; right: 0; height: 54px;
      display: none; align-items: center; justify-content: space-between;
      padding: 0 1.2rem; z-index: 300;
      background: linear-gradient(to bottom, rgba(0,0,20,.9), transparent);
      pointer-events: none;
    }
    .hud-item { font-size: clamp(.7rem,2.5vw,.95rem); letter-spacing: .12em; color: #00f5ff; text-shadow: 0 0 8px #00f5ff99; }
    .hud-item span { color: #fff; font-weight: bold; }

    /* Level banner */
    #levelBanner {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      z-index: 250; pointer-events: none; opacity: 0; transition: opacity .5s;
    }
    #levelBanner.show { opacity: 1; }
    .banner-text {
      font-size: clamp(2rem,8vw,4rem); letter-spacing: .2em; text-align: center; white-space: pre-line;
      background: linear-gradient(135deg, #ffd700, #ff6b6b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* Flash screen */
    .logo {
      font-size: clamp(2.5rem,10vw,5rem); font-weight: 900; letter-spacing: .15em; text-align: center;
      background: linear-gradient(135deg, #00f5ff, #7b2fff, #ff6b6b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { filter: brightness(1) } 50% { filter: brightness(1.5) } }
    .subtitle  { font-size: clamp(.9rem,3vw,1.3rem); color: #7ecfff; letter-spacing: .3em; margin: .5rem 0 2rem; text-transform: uppercase; }
    .credits   { font-size: clamp(.75rem,2.5vw,1rem); color: #8899bb; text-align: center; line-height: 2; }
    .credits strong { color: #00f5ff; }
    .start-hint { margin-top: 2rem; color: #ffffff77; animation: blink 1.4s infinite; }
    @keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: .1 } }

    /* Setup */
    #setupScreen h2 { font-size: clamp(1.8rem,6vw,3rem); letter-spacing: .2em; color: #00f5ff; margin-bottom: 1.5rem; }
    .option-group  { margin: .4rem 0; width: min(400px,90vw); display: flex; flex-direction: column; gap: .35rem; }
    .option-group label { font-size: .85rem; color: #7ecfff; letter-spacing: .1em; }
    .option-group select,
    .option-group input[type=range] { width: 100%; background: #0a1a3a; border: 1px solid #1e4080; color: #fff; padding: .45rem; border-radius: 4px; font-family: inherit; cursor: pointer; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; width: min(400px,90vw); margin: .4rem 0; }
    .toggle-row > label:first-child { font-size: .9rem; color: #7ecfff; letter-spacing: .1em; }
    .toggle { position: relative; width: 52px; height: 28px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider-tog { position: absolute; inset: 0; background: #1a2a4a; border-radius: 28px; cursor: pointer; transition: .3s; }
    .slider-tog::before { content: ''; position: absolute; width: 20px; height: 20px; left: 4px; top: 4px; background: #fff; border-radius: 50%; transition: .3s; }
    .toggle input:checked + .slider-tog               { background: #7b2fff; }
    .toggle input:checked + .slider-tog::before       { transform: translateX(24px); }
    .btn { margin-top: 1.4rem; padding: .9rem 2.8rem; font-family: inherit; font-size: 1.1rem; letter-spacing: .2em; text-transform: uppercase; background: linear-gradient(135deg,#7b2fff,#00f5ff); color: #fff; border: none; border-radius: 6px; cursor: pointer; transition: filter .2s, transform .1s; }
    .btn:hover  { filter: brightness(1.3); transform: scale(1.03); }
    .btn:active { transform: scale(.97); }

    /* Game over */
    #gameOverScreen h2 { font-size: clamp(2rem,8vw,4rem); letter-spacing: .2em; color: #ff6b6b; margin-bottom: 1rem; }
    .final-score { font-size: clamp(1.2rem,4vw,2rem); color: #ffd700; margin-bottom: 1rem; }
    .high-score  { font-size: 1rem; color: #7ecfff; margin-bottom: 1.5rem; }
  </style>
</head>
<body>

<!-- ── FLASH SCREEN ── -->
<div id="flashScreen" class="screen">
  <div class="logo">STELLAR DRIFT</div>
  <div class="subtitle">VR Space Survival</div>
  <div class="credits">
    <strong>CMPT 461 – Immersive Computing</strong><br>
    Individual Project · Simon Fraser University<br>
    Built with A-Frame 1.5 · Web Audio API
  </div>
  <div class="start-hint">▶ TAP ANYWHERE TO CONTINUE</div>
</div>

<!-- ── SETUP SCREEN ── -->
<div id="setupScreen" class="screen hidden">
  <h2>⚙ SETUP</h2>
  <div class="option-group">
    <label>DIFFICULTY</label>
    <select id="diffSelect">
      <option value="easy">EASY – Relaxed asteroid speed</option>
      <option value="normal" selected>NORMAL – Standard challenge</option>
      <option value="hard">HARD – Brace yourself</option>
    </select>
  </div>
  <div class="option-group">
    <label>MUSIC VOLUME &nbsp;<span id="volLabel">60%</span></label>
    <input type="range" id="musicVol" min="0" max="100" value="60">
  </div>
  <div class="toggle-row">
    <label>BACKGROUND MUSIC</label>
    <label class="toggle"><input type="checkbox" id="musicToggle" checked><span class="slider-tog"></span></label>
  </div>
  <div class="toggle-row">
    <label>SOUND EFFECTS</label>
    <label class="toggle"><input type="checkbox" id="sfxToggle" checked><span class="slider-tog"></span></label>
  </div>
  <div class="toggle-row">
    <label>STEREOSCOPIC (VR MODE)</label>
    <label class="toggle"><input type="checkbox" id="stereoToggle"><span class="slider-tog"></span></label>
  </div>
  <button class="btn" id="startBtn">LAUNCH GAME</button>
</div>

<!-- ── GAME OVER ── -->
<div id="gameOverScreen" class="screen hidden">
  <h2>GAME OVER</h2>
  <div class="final-score">SCORE: <span id="finalScore">0</span></div>
  <div class="high-score">BEST: <span id="highScore">0</span></div>
  <button class="btn" id="restartBtn">PLAY AGAIN</button>
</div>

<!-- ── HUD ── -->
<div id="hud">
  <div class="hud-item">SCORE <span id="scoreDisplay">0</span></div>
  <div class="hud-item">LEVEL <span id="levelDisplay">1</span></div>
  <div class="hud-item">LIVES <span id="livesDisplay">❤❤❤</span></div>
  <div class="hud-item">TIME  <span id="timeDisplay">60</span></div>
</div>

<!-- ── LEVEL BANNER ── -->
<div id="levelBanner"><div class="banner-text" id="bannerText">LEVEL 1</div></div>

<!-- ── A-FRAME SCENE ── -->
<!-- Scene is always rendered; UI screens are CSS overlays on top -->
<a-scene
  id="mainScene"
  vr-mode-ui="enabled: true"
  renderer="antialias: true; colorManagement: true"
  loading-screen="enabled: false">

  <!-- Space sky gradient -->
  <a-sky color="#020215" radius="490"></a-sky>

  <!-- Nebula shell (visible from inside) -->
  <a-entity
    geometry="primitive: sphere; radius: 450; segmentsWidth: 8; segmentsHeight: 6"
    material="color: #060028; side: back; shader: flat; opacity: 0.9"
    position="0 0 0">
  </a-entity>

  <!-- Stars and nebula blobs populated by JS -->
  <a-entity id="starfield"></a-entity>

  <!-- Player rig -->
  <a-entity id="rig" position="0 0 0">
    <a-camera id="playerCam" look-controls="enabled: true; reverseMouseDrag: false" wasd-controls="enabled: false" fov="80">
      <!-- Gaze cursor -->
      <a-entity
        cursor="fuse: true; fuseTimeout: 1200"
        position="0 0 -1"
        geometry="primitive: ring; radiusInner: 0.014; radiusOuter: 0.024"
        material="color: #00f5ff; shader: flat; opacity: 0.9"
        animation__fusing="property: scale; startEvents: fusing; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1200"
        animation__click="property:  scale; startEvents: click;  from: 0.1 0.1 0.1; to: 1 1 1; dur: 180"
        raycaster="far: 80; objects: .interactive">
      </a-entity>
    </a-camera>
  </a-entity>

  <!-- Game containers -->
  <a-entity id="collectibles"></a-entity>
  <a-entity id="asteroids"></a-entity>
  <a-entity id="boss" visible="false"></a-entity>

  <!-- Lighting: generous so everything is visible regardless of angle -->
  <a-light type="ambient"     color="#6677aa" intensity="1.5"></a-light>
  <a-light type="directional" color="#ffffff" intensity="2.5" position="2 4 -2" castShadow="false"></a-light>
  <a-light type="point"       color="#0088ff" intensity="2"   distance="120" position="0 15 -20"></a-light>
  <a-light type="point"       color="#ff44aa" intensity="1.2" distance="80"  position="-20 8 -10"></a-light>

</a-scene>

<script>
/* ══════════════════════════════════════════════
   AUDIO  (Web Audio API – zero external files)
══════════════════════════════════════════════ */
let audioCtx=null, bgTimer=null, bgGain=null;
const getAudio=()=>{ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; };
const resumeAudio=()=>{ const c=getAudio(); if(c.state==='suspended') c.resume(); };

function playTone(freq,type,dur,vol=0.25,when=0){
  if(!CONFIG.sfx) return;
  try{
    const c=getAudio(), o=c.createOscillator(), g=c.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,c.currentTime+when);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+when+dur);
    o.connect(g); g.connect(c.destination);
    o.start(c.currentTime+when); o.stop(c.currentTime+when+dur);
  }catch(e){}
}
function playSFX(n){
  if(!CONFIG.sfx) return;
  const map={
    collect: [[800,'sine',.12],[1100,'sine',.1,.2,.07]],
    hit:     [[140,'sawtooth',.35,.5]],
    levelup: [[523,'sine',.18],[659,'sine',.18,.2,.13],[784,'sine',.2,.2,.26]],
    gameover:[[220,'sawtooth',.5,.4],[155,'sawtooth',.6,.3,.42]],
    gaze:    [[1400,'sine',.07,.18]]
  };
  (map[n]||[]).forEach(a=>playTone(...a));
}
function startBGMusic(){
  if(!CONFIG.music) return; stopBGMusic();
  try{
    const c=getAudio(); bgGain=c.createGain(); bgGain.gain.value=CONFIG.musicVolume; bgGain.connect(c.destination);
    const freqs=[110,138.6,164.8,196,220]; let idx=0;
    const tick=()=>{
      const o=c.createOscillator(), g=c.createGain();
      o.type='triangle'; o.frequency.value=freqs[idx%freqs.length]*(idx%8<4?1:1.5);
      g.gain.setValueAtTime(.12,c.currentTime); g.gain.linearRampToValueAtTime(0,c.currentTime+.46);
      o.connect(g); g.connect(bgGain); o.start(c.currentTime); o.stop(c.currentTime+.46);
      idx++; bgTimer=setTimeout(tick,480);
    }; tick();
  }catch(e){}
}
function stopBGMusic(){ clearTimeout(bgTimer); bgTimer=null; if(bgGain){try{bgGain.disconnect();}catch(e){} bgGain=null;} }
const setBGVolume=v=>{ if(bgGain) bgGain.gain.value=v; };

/* ══════════════════════════════════════════════
   CONFIG & STATE
══════════════════════════════════════════════ */
const CONFIG={ difficulty:'normal', music:true, sfx:true, musicVolume:.6, stereo:false };
const DIFF={
  easy:  { speed:.2,  spawnMs:2600, lives:5, secs:90 },
  normal:{ speed:.45, spawnMs:1750, lives:3, secs:60 },
  hard:  { speed:.82, spawnMs:1050, lives:2, secs:45 }
};
let STATE={
  phase:'flash', level:1, score:0, lives:3, timeLeft:60,
  highScore: parseInt(localStorage.getItem('sd_hs')||'0'),
  asteroids:[], collectibles:[], spawnT:null, colT:null, tickT:null, rafId:null,
  bossAlive:false, bossAngle:0, bossHits:0
};

/* ══════════════════════════════════════════════
   DOM HELPERS
══════════════════════════════════════════════ */
const $=id=>document.getElementById(id);
const hideAll=()=>['flashScreen','setupScreen','gameOverScreen'].forEach(id=>$(id).classList.add('hidden'));
const showScreen=id=>{ hideAll(); if(id) $(id).classList.remove('hidden'); };
function updateHUD(){
  $('scoreDisplay').textContent=STATE.score;
  $('levelDisplay').textContent=STATE.level;
  $('livesDisplay').textContent='❤'.repeat(Math.max(0,STATE.lives));
  $('timeDisplay').textContent=Math.max(0,Math.ceil(STATE.timeLeft));
}
function showBanner(txt,ms=2200){ $('bannerText').textContent=txt; $('levelBanner').classList.add('show'); setTimeout(()=>$('levelBanner').classList.remove('show'),ms); }
function flashScore(){ const el=$('scoreDisplay'); el.style.cssText='transform:scale(1.5);color:#ffd700;transition:.15s'; setTimeout(()=>el.style.cssText='',400); }

/* ══════════════════════════════════════════════
   TEXTURES  (Canvas API – no image files needed)
══════════════════════════════════════════════ */
const TEX={};
function mkCanvas(w,h,fn){ const c=document.createElement('canvas'); c.width=w; c.height=h; fn(c.getContext('2d'),w,h); return c.toDataURL(); }

function generateTextures(){
  // Rocky asteroid
  TEX.asteroid=mkCanvas(256,256,(ctx,w,h)=>{
    const g=ctx.createRadialGradient(w/2,h/2,8,w/2,h/2,w/2);
    g.addColorStop(0,'#9a8a70'); g.addColorStop(.5,'#5a4e38'); g.addColorStop(1,'#1e1810');
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
    for(let i=0;i<28;i++){
      const cx=Math.random()*w, cy=Math.random()*h, r=3+Math.random()*18;
      const g2=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
      g2.addColorStop(0,'rgba(0,0,0,.85)'); g2.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    }
    for(let i=0;i<90;i++){ ctx.fillStyle=`rgba(230,210,170,${Math.random()*.6})`; ctx.fillRect(Math.random()*w,Math.random()*h,2,2); }
  });
  // Blue crystal gem
  TEX.gemBlue=mkCanvas(128,128,(ctx,w)=>{
    const g=ctx.createRadialGradient(38,38,3,64,64,64);
    g.addColorStop(0,'#ffffff'); g.addColorStop(.2,'#66ddff'); g.addColorStop(.7,'#0044cc'); g.addColorStop(1,'#000022');
    ctx.fillStyle=g; ctx.fillRect(0,0,w,w);
    ctx.globalAlpha=.4;
    for(let i=0;i<7;i++){ ctx.strokeStyle='rgba(150,240,255,.9)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(64,64); ctx.lineTo(64+Math.cos(i*Math.PI*2/7)*56,64+Math.sin(i*Math.PI*2/7)*56); ctx.stroke(); }
    ctx.globalAlpha=1;
  });
  // Gold crystal gem
  TEX.gemGold=mkCanvas(128,128,(ctx,w)=>{
    const g=ctx.createRadialGradient(38,38,3,64,64,64);
    g.addColorStop(0,'#ffffff'); g.addColorStop(.2,'#ffee66'); g.addColorStop(.7,'#bb7700'); g.addColorStop(1,'#110800');
    ctx.fillStyle=g; ctx.fillRect(0,0,w,w);
    ctx.globalAlpha=.4;
    for(let i=0;i<7;i++){ ctx.strokeStyle='rgba(255,240,120,.9)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(64,64); ctx.lineTo(64+Math.cos(i*Math.PI*2/7)*56,64+Math.sin(i*Math.PI*2/7)*56); ctx.stroke(); }
    ctx.globalAlpha=1;
  });
  // Planet / boss texture
  TEX.planet=mkCanvas(512,512,(ctx,w,h)=>{
    const g=ctx.createLinearGradient(0,0,w,h);
    g.addColorStop(0,'#1a3a8a'); g.addColorStop(.5,'#0e1f55'); g.addColorStop(1,'#080d2a');
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
    for(let i=0;i<12;i++){ ctx.fillStyle=`hsla(${200+i*9},75%,${28+i*3}%,.28)`; ctx.fillRect(0,20+i*42,w,22); }
    const a=ctx.createRadialGradient(w/2,h/2,150,w/2,h/2,w/2);
    a.addColorStop(0,'rgba(0,0,0,0)'); a.addColorStop(1,'rgba(0,80,255,.4)');
    ctx.fillStyle=a; ctx.fillRect(0,0,w,h);
  });
}

/* ══════════════════════════════════════════════
   STARFIELD  (bright, layered, clearly visible)
══════════════════════════════════════════════ */
function buildStarfield(){
  const cont=$('starfield'); cont.innerHTML='';
  // [count, minDist, maxDist, minR, maxR, emissiveIntensity]
  [[100,80,200,.3,1.2,1.0],[50,40,80,.8,2.0,1.5],[25,20,40,1.5,3.5,2.0]].forEach(([n,dMin,dMax,rMin,rMax,em])=>{
    for(let i=0;i<n;i++){
      const r=rMin+Math.random()*(rMax-rMin);
      const d=dMin+Math.random()*(dMax-dMin);
      const theta=Math.random()*Math.PI*2, phi=Math.acos(Math.random()*2-1);
      const x=(d*Math.sin(phi)*Math.cos(theta)).toFixed(1);
      const y=(d*Math.sin(phi)*Math.sin(theta)).toFixed(1);
      const z=(d*Math.cos(phi)).toFixed(1);
      const pick=Math.random();
      const col=pick<.6?'#ffffff': pick<.8?`hsl(${200+~~(Math.random()*40)},90%,95%)`:`hsl(${40+~~(Math.random()*20)},90%,95%)`;
      const e=document.createElement('a-sphere');
      e.setAttribute('radius', r.toFixed(2));
      e.setAttribute('position',`${x} ${y} ${z}`);
      e.setAttribute('material',`color:${col}; emissive:${col}; emissiveIntensity:${em}; shader:flat`);
      cont.appendChild(e);
    }
  });
  // Coloured nebula blobs for depth
  [['#0a0060',-35,8,-50,35],['#001500',28,-10,-30,28],['#220010',-12,15,-60,45]].forEach(([col,x,y,z,r])=>{
    const b=document.createElement('a-sphere');
    b.setAttribute('radius',r); b.setAttribute('position',`${x} ${y} ${z}`);
    b.setAttribute('material',`color:${col}; shader:flat; opacity:0.25; side:double`);
    cont.appendChild(b);
  });
}

/* ══════════════════════════════════════════════
   SPAWNING
══════════════════════════════════════════════ */
let _id=0;
function spawnAsteroid(){
  if(STATE.phase!=='playing') return;
  const diff=DIFF[CONFIG.difficulty];
  const d=22+Math.random()*14;
  const theta=Math.random()*Math.PI*2, phi=Math.acos(Math.random()*2-1);
  const x=d*Math.sin(phi)*Math.cos(theta), y=d*Math.sin(phi)*Math.sin(theta), z=d*Math.cos(phi);
  const sz=STATE.level===2 ? .6+Math.random()*2.0 : .5+Math.random()*1.2;
  const id=`ast_${_id++}`;
  const ent=document.createElement('a-entity');
  ent.setAttribute('id',id); ent.setAttribute('position',`${x.toFixed(2)} ${y.toFixed(2)} ${z.toFixed(2)}`);
  ent.setAttribute('class','asteroid');
  const mesh=document.createElement('a-dodecahedron');
  mesh.setAttribute('radius', sz.toFixed(2));
  mesh.setAttribute('material',`src:${TEX.asteroid}; color:#ccbbaa; emissive:#4a3a20; emissiveIntensity:0.9; roughness:0.85; metalness:0.15`);
  mesh.setAttribute('animation',`property:rotation; to:${~~(Math.random()*360)} ${~~(Math.random()*360)} ${~~(Math.random()*360)}; dur:${3000+~~(Math.random()*7000)}; loop:true; easing:linear`);
  ent.appendChild(mesh);
  $('asteroids').appendChild(ent);
  STATE.asteroids.push({ el:ent, id, x, y, z, vx:-x/d*diff.speed, vy:-y/d*diff.speed, vz:-z/d*diff.speed, size:sz });
}

function spawnCollectible(){
  if(STATE.phase!=='playing') return;
  const id=`col_${_id++}`;
  const dist=9+Math.random()*9;
  const ang=Math.random()*Math.PI*2;
  const y=(Math.random()-.5)*6;
  const x=dist*Math.cos(ang), z=dist*Math.sin(ang);
  const gold=Math.random()>.5;
  const color=gold?'#ffdd00':'#00ccff', emcol=gold?'#ffaa00':'#0088ff';
  const ent=document.createElement('a-entity');
  ent.setAttribute('id',id); ent.setAttribute('position',`${x.toFixed(2)} ${y.toFixed(2)} ${z.toFixed(2)}`);
  ent.setAttribute('class','interactive collectible');
  const mesh=document.createElement('a-octahedron');
  mesh.setAttribute('radius','0.6');
  mesh.setAttribute('material',`src:${gold?TEX.gemGold:TEX.gemBlue}; color:${color}; emissive:${emcol}; emissiveIntensity:2.0; metalness:.7; roughness:.15`);
  mesh.setAttribute('animation__spin','property:rotation; to:0 360 0; dur:1800; loop:true; easing:linear');
  mesh.setAttribute('animation__bob',`property:position; from:0 0 0; to:0 0.35 0; dir:alternate; dur:1100; loop:true; easing:easeInOutSine`);
  ent.appendChild(mesh);
  const lt=document.createElement('a-light'); lt.setAttribute('type','point'); lt.setAttribute('color',color); lt.setAttribute('intensity','3'); lt.setAttribute('distance','14');
  ent.appendChild(lt);
  $('collectibles').appendChild(ent);
  STATE.collectibles.push({ el:ent, id, x, y, z, ang, dist, value:gold?25:10, radius:1.8 });
}

function spawnBoss(){
  const boss=$('boss'); boss.innerHTML=''; boss.setAttribute('visible','true'); boss.setAttribute('position','0 0 -28');
  // Main planet body
  const body=document.createElement('a-sphere'); body.setAttribute('radius','4.5');
  body.setAttribute('material',`src:${TEX.planet}; emissive:#0a1844; emissiveIntensity:.6`);
  body.setAttribute('animation','property:rotation; to:0 360 0; dur:5000; loop:true; easing:linear');
  boss.appendChild(body);
  // Glowing ring
  const ring=document.createElement('a-torus'); ring.setAttribute('radius','7'); ring.setAttribute('radius-tubular','.45');
  ring.setAttribute('material','color:#ff8800; emissive:#ff5500; emissiveIntensity:2; metalness:.9');
  ring.setAttribute('rotation','90 0 0');
  ring.setAttribute('animation','property:rotation; to:90 360 0; dur:3500; loop:true; easing:linear');
  boss.appendChild(ring);
  // Gaze target eye
  const eye=document.createElement('a-sphere'); eye.setAttribute('class','interactive boss-eye');
  eye.setAttribute('radius','1.8'); eye.setAttribute('position','0 0 4.3');
  eye.setAttribute('material','color:#ff0000; emissive:#ff0000; emissiveIntensity:2.5');
  const eL=document.createElement('a-light'); eL.setAttribute('type','point'); eL.setAttribute('color','#ff2200'); eL.setAttribute('intensity','4'); eL.setAttribute('distance','20');
  eye.appendChild(eL); boss.appendChild(eye);
  STATE.bossAlive=true; STATE.bossHits=0;
}

/* ══════════════════════════════════════════════
   COLLISION DETECTION
══════════════════════════════════════════════ */
function d3(a,b){ const dx=a.x-b.x, dy=a.y-b.y, dz=a.z-b.z; return Math.sqrt(dx*dx+dy*dy+dz*dz); }
const ORIGIN={x:0,y:0,z:0};
function checkCollisions(){
  // Asteroids → player
  for(let i=STATE.asteroids.length-1;i>=0;i--){
    const a=STATE.asteroids[i];
    if(d3(ORIGIN,a)<a.size+0.9){
      a.el.remove(); STATE.asteroids.splice(i,1);
      STATE.lives--; updateHUD(); playSFX('hit');
      // Red flash HUD
      $('hud').style.background='rgba(255,0,0,.4)';
      setTimeout(()=>$('hud').style.background='linear-gradient(to bottom,rgba(0,0,20,.9),transparent)',600);
      if(STATE.lives<=0){ endGame(); return; }
    } else if(d3(ORIGIN,a)>80){ a.el.remove(); STATE.asteroids.splice(i,1); }
  }
  // Collectibles → player proximity pickup
  for(let i=STATE.collectibles.length-1;i>=0;i--){
    const c=STATE.collectibles[i];
    if(d3(ORIGIN,c)<c.radius){ c.el.remove(); STATE.collectibles.splice(i,1); STATE.score+=c.value; updateHUD(); playSFX('collect'); flashScore(); }
  }
}

/* ══════════════════════════════════════════════
   GAME LOOP
══════════════════════════════════════════════ */
let lastT=0;
function gameLoop(ts){
  if(STATE.phase!=='playing') return;
  const dt=Math.min((ts-lastT)/1000,.1); lastT=ts;
  // Move asteroids toward origin
  for(const a of STATE.asteroids){ a.x+=a.vx*dt*60; a.y+=a.vy*dt*60; a.z+=a.vz*dt*60; a.el.setAttribute('position',`${a.x.toFixed(2)} ${a.y.toFixed(2)} ${a.z.toFixed(2)}`); }
  // Orbit collectibles
  for(const c of STATE.collectibles){ c.ang=(c.ang||0)+dt*.35; c.x=c.dist*Math.cos(c.ang); c.z=c.dist*Math.sin(c.ang); c.el.setAttribute('position',`${c.x.toFixed(2)} ${c.y.toFixed(2)} ${c.z.toFixed(2)}`); }
  // Boss orbit
  if(STATE.level===2&&STATE.bossAlive){ STATE.bossAngle+=dt*.22; $('boss').setAttribute('position',`${(18*Math.cos(STATE.bossAngle)).toFixed(2)} ${(4*Math.sin(STATE.bossAngle*.7)).toFixed(2)} ${(-22+10*Math.sin(STATE.bossAngle)).toFixed(2)}`); }
  checkCollisions();
  STATE.rafId=requestAnimationFrame(gameLoop);
}

/* ══════════════════════════════════════════════
   LEVEL MANAGEMENT
══════════════════════════════════════════════ */
function clearAll(){
  clearInterval(STATE.spawnT); clearInterval(STATE.colT); clearInterval(STATE.tickT); cancelAnimationFrame(STATE.rafId);
  $('asteroids').innerHTML=''; $('collectibles').innerHTML='';
  const b=$('boss'); b.innerHTML=''; b.setAttribute('visible','false');
  STATE.asteroids=[]; STATE.collectibles=[]; STATE.bossAlive=false;
}
function startLevel(lvl){
  clearAll(); STATE.level=lvl; STATE.timeLeft=DIFF[CONFIG.difficulty].secs+(lvl===2?30:0);
  updateHUD(); showBanner(lvl===1?'LEVEL 1\nSURVIVE!':'LEVEL 2\nDESTROY THE BOSS!',2500);
  const iv=lvl===2 ? ~~(DIFF[CONFIG.difficulty].spawnMs*.65) : DIFF[CONFIG.difficulty].spawnMs;
  setTimeout(()=>{
    if(lvl===2) spawnBoss();
    STATE.spawnT=setInterval(spawnAsteroid,iv);
    STATE.colT=setInterval(spawnCollectible,2800);
    STATE.tickT=setInterval(()=>{
      STATE.timeLeft-=.1; updateHUD();
      if(STATE.timeLeft<=0){ if(STATE.level===1){ clearAll(); playSFX('levelup'); showBanner('LEVEL 2\nLOADING...',1800); setTimeout(()=>startLevel(2),2000); } else winGame(); }
    },100);
    lastT=performance.now(); STATE.rafId=requestAnimationFrame(gameLoop);
  },2800);
}

/* ══════════════════════════════════════════════
   WIN / LOSE
══════════════════════════════════════════════ */
function saveHS(){ if(STATE.score>STATE.highScore){ STATE.highScore=STATE.score; localStorage.setItem('sd_hs',STATE.highScore); } }
function endGame(){
  clearAll(); STATE.phase='gameover'; playSFX('gameover'); stopBGMusic(); saveHS();
  $('finalScore').textContent=STATE.score; $('highScore').textContent=STATE.highScore;
  $('hud').style.display='none'; showScreen('gameOverScreen');
}
function winGame(){
  clearAll(); STATE.phase='gameover'; STATE.score+=1000; playSFX('levelup'); stopBGMusic(); saveHS();
  $('finalScore').textContent=STATE.score+' 🏆 YOU WIN!'; $('highScore').textContent=STATE.highScore;
  $('hud').style.display='none'; showScreen('gameOverScreen');
}

/* ══════════════════════════════════════════════
   UI EVENT HANDLERS
══════════════════════════════════════════════ */
$('musicVol').addEventListener('input',()=>{
  const v=$('musicVol').value/100; $('volLabel').textContent=$('musicVol').value+'%';
  CONFIG.musicVolume=v; setBGVolume(v);
});
$('flashScreen').addEventListener('click',()=>{
  $('flashScreen').classList.add('hidden');
  setTimeout(()=>$('setupScreen').classList.remove('hidden'),120);
});
$('startBtn').addEventListener('click',e=>{
  e.preventDefault(); e.stopPropagation(); resumeAudio();
  CONFIG.difficulty=$('diffSelect').value;
  CONFIG.music=$('musicToggle').checked;
  CONFIG.sfx=$('sfxToggle').checked;
  CONFIG.musicVolume=$('musicVol').value/100;
  CONFIG.stereo=$('stereoToggle').checked;
  // Hide all UI overlays
  hideAll();
  $('hud').style.display='flex';
  // Generate assets and start
  generateTextures();
  buildStarfield();
  STATE.phase='playing'; STATE.score=0; STATE.lives=DIFF[CONFIG.difficulty].lives;
  updateHUD(); startBGMusic(); startLevel(1);
  // Optional VR mode
  if(CONFIG.stereo) setTimeout(()=>{ const sc=document.querySelector('a-scene'); if(sc&&sc.enterVR) sc.enterVR().catch(()=>{}); },700);
});
$('restartBtn').addEventListener('click',()=>{
  STATE.phase='flash'; $('hud').style.display='none'; showScreen('flashScreen');
});

/* ══════════════════════════════════════════════
   GAZE INTERACTION + INIT
══════════════════════════════════════════════ */
window.addEventListener('load',()=>{
  $('highScore').textContent=STATE.highScore;

  // A-Frame click events (fired by gaze cursor)
  $('mainScene').addEventListener('click',e=>{
    const t=e.detail&&e.detail.intersectedEl; if(!t) return;
    // Gaze-collect a gem
    if(t.classList.contains('collectible')){
      const par=t.closest('[class*="collectible"]')||t.parentNode;
      const idx=STATE.collectibles.findIndex(c=>c.el===par||c.el.contains(t));
      if(idx>=0){ const c=STATE.collectibles[idx]; c.el.remove(); STATE.collectibles.splice(idx,1); STATE.score+=c.value*2; updateHUD(); playSFX('collect'); flashScore(); }
    }
    // Gaze-hit the boss eye
    if(t.classList.contains('boss-eye')&&STATE.bossAlive){
      STATE.bossHits++; playSFX('gaze');
      t.setAttribute('material',`color:hsl(${20-STATE.bossHits*4},100%,50%); emissive:hsl(${20-STATE.bossHits*4},100%,40%); emissiveIntensity:2.5`);
      if(STATE.bossHits>=5){
        $('boss').setAttribute('visible','false'); STATE.bossAlive=false; STATE.score+=500; updateHUD();
        showBanner('BOSS DEFEATED!\n+500 PTS',2500); playSFX('levelup'); setTimeout(()=>winGame(),3200);
      }
    }
  });

  // Attach head-drift to camera once A-Frame is ready
  const sc=$('mainScene');
  const attachDrift=()=>{ const cam=$('playerCam'); if(cam) cam.setAttribute('head-drift',''); };
  if(sc.hasLoaded) attachDrift(); else sc.addEventListener('loaded',attachDrift);
});
</script>
