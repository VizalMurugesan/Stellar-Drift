<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Test</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    body { margin:0; }
    #startBtn {
      position:fixed;
      top:20px;
      left:20px;
      z-index:10;
      padding:10px;
      background:#7b2fff;
      color:white;
      border:none;
    }
  </style>
</head>

<body>

<button id="startBtn">START</button>

<a-scene id="scene" embedded>
  
  <!-- CAMERA (IMPORTANT) -->
  <a-camera position="0 1.6 0"></a-camera>

  <!-- LIGHT -->
  <a-light type="ambient" intensity="1"></a-light>

  <!-- SKY -->
  <a-sky color="#222"></a-sky>

  <!-- OBJECT (YOU MUST SEE THIS) -->
  <a-box position="0 1 -3" color="red"></a-box>

</a-scene>

<script>
const btn = document.getElementById("startBtn");
const scene = document.getElementById("scene");

btn.onclick = () => {
  console.log("Clicked");

  // CRITICAL FIX: wait for scene to load
  if (!scene.hasLoaded) {
    scene.addEventListener("loaded", startGame);
  } else {
    startGame();
  }
};

function startGame() {
  console.log("Scene loaded → starting");

  // DO NOT auto enter VR (causes black screen sometimes)
  // scene.enterVR();  <-- REMOVE THIS

}
</script>

</body>
</html>
