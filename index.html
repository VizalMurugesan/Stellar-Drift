<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Space Survival</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <a-scene background="color: black">

    <!-- Camera -->
    <a-entity camera look-controls wasd-controls position="0 1.6 0">
      <a-cursor color="white"></a-cursor>
    </a-entity>

    <!-- Lighting -->
    <a-entity light="type: ambient; intensity: 0.5"></a-entity>
    <a-entity light="type: point; intensity: 1; position="2 4 4"></a-entity>

    <!-- Ground -->
    <a-plane rotation="-90 0 0" width="50" height="50" color="#111"></a-plane>

    <!-- Stars (simple spheres) -->
    <a-sphere position="5 5 -10" radius="0.2" color="white"></a-sphere>
    <a-sphere position="-5 3 -8" radius="0.2" color="white"></a-sphere>
    <a-sphere position="3 7 -12" radius="0.2" color="white"></a-sphere>

    <!-- Player Base -->
    <a-box position="0 1 -5" color="#4CC3D9"></a-box>

    <!-- Enemy -->
    <a-sphere id="enemy" position="0 1 -10" radius="1" color="red"></a-sphere>

  </a-scene>

  <script>
    // Simple enemy movement
    const enemy = document.querySelector("#enemy");

    function animateEnemy() {
      let z = -10;
      setInterval(() => {
        z += 0.05;
        enemy.setAttribute("position", `0 1 ${z}`);
      }, 50);
    }

    window.addEventListener("load", () => {
      console.log("Scene loaded");
      animateEnemy();
    });
  </script>

</body>
</html>
